services:
  locreport:
    build: .
    image: locreport
    container_name: locreport
    ports:
      - "4317:4317"
    volumes:
      # Persist the bare-clone + per-commit cache across restarts.
      - locreport-cache:/cache
    environment:
      PORT: "4317"
      LOCREPORT_CACHE_DIR: /cache
      # --- safety limits (defaults shown; uncomment to tune) ---
      # LOCREPORT_MAX_CONCURRENT: "2"    # simultaneous analyses (server-wide)
      # LOCREPORT_MAX_PER_IP: "2"        # simultaneous analyses per client IP (running + queued)
      # LOCREPORT_MAX_QUEUE: "10"        # waiters before "server busy"
      # LOCREPORT_RATE_MAX: "30"         # requests per IP per window
      # LOCREPORT_RATE_WINDOW_MS: "60000"
      # LOCREPORT_MAX_REPO_MB: "2048"    # reject bare repos larger than this
      # LOCREPORT_MAX_CACHE_MB: "5120"   # total cached-clone budget (LRU-evicted; 0 disables)
      # LOCREPORT_GIT_TIMEOUT_MS: "300000"
      # LOCREPORT_ANALYSIS_TIMEOUT_MS: "600000"
      # LOCREPORT_TRUST_PROXY: "1"       # trust X-Forwarded-For (only behind a trusted proxy)
      # Optional: raises the GitHub API rate limit for the pre-clone size check
      # (unauthenticated is 60/hr per IP). Public read only; no scopes needed.
      # GITHUB_TOKEN: "ghp_..."
      # --- custom head includes (see public/includes.example.html) ---
      # LOCREPORT_INCLUDES_FILE: /app/public/includes.html
      # LOCREPORT_CSP: "default-src 'self'"   # loosen if includes load external/inline assets
    restart: unless-stopped

volumes:
  locreport-cache:
